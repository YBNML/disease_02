name: disease-detection
channels: [pytorch, conda-forge, defaults]
dependencies:
  - python=3.11
  - pytorch::pytorch>=2.3
  - pytorch::torchvision>=0.18
  - pip
  - pip:
      - python-dotenv
      - hydra-core>=1.3
      - omegaconf>=2.3
      - torchmetrics>=1.4
      - pytorch-lightning>=2.3
      - pytest>=8
      - pytest-mock
      - ruff
      - black
      - -e .

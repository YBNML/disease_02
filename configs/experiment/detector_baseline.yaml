# @package _global_
defaults:
  - override /data: aihub_combined
  - override /model: detector_fasterrcnn
  - override /trainer: ubuntu_gpu

run:
  name: detector_baseline

# DetectorлЉ” val/lossк°Ђ м•„л‹Њ val/map_50мќ„ лЄЁл‹€н„°н•њл‹¤ (FasterRCNNModuleмќЂ
# epoch л‹Ёмњ„лЎњ torchmetrics MeanAveragePrecisionмќ„ м§‘кі„н•ґ лЎњк№…н•њл‹¤).
trainer:
  early_stopping:
    monitor: val/map_50
    patience: 5
    mode: max
  checkpoint:
    monitor: val/map_50
    mode: max
    save_top_k: 3
    filename: "{epoch}-{val/map_50:.4f}"

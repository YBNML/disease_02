# @package _global_
# 범용 결함 (4-부위 × 3-state) multi-head 분류기 학습.
defaults:
  - override /data: aihub_combined
  - override /model: classifier_multipart
  - override /trainer: ubuntu_gpu

run:
  name: defect_baseline

classifier:
  kind: defect
  label_source: vlm
  vlm_jsonl: ${paths.dataset_root}/labels/vlm_severity/severity_labels.jsonl

trainer:
  max_epochs: 30
